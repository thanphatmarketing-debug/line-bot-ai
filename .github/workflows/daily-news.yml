name: Daily News LINE Notify

on:
  schedule:
    - cron: '0 2 * * 1-6'    # 09:00 Bangkok (UTC+7)
    - cron: '0 5 * * 1-6'    # 12:00 Bangkok
    - cron: '0 8 * * 1-6'    # 15:00 Bangkok
    - cron: '0 10 * * 1-6'   # 17:00 Bangkok
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Send news to LINE
        run: node scripts/send-news.js
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
